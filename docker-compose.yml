services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hab
      POSTGRES_PASSWORD: hab
      POSTGRES_DB: hab
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: gunicorn hab.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  realtime:
    build: .
    command: uvicorn realtime.main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - api
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A hab worker -l info
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A hab beat -l info
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
